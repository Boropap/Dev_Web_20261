<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Adding Bootstrap -->
    <!-- Link is for CSS and Script is for JS -->
    <link   href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- Links style.css -->
    <link rel="stylesheet" href="style.css">
    <title>Caio Rangel CV</title>
</head>
<body>
    <!-- Here is the script for JS that the bootstrap requires -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <div class="d-flex justify-content-center align-items-center min-vh-100">

        <div class = "infoWindow w-75 p-4 rounded-4 shadow-lg text-center">

            <ul class="nav nav-pills row g-3 mb-4" id="pills-tab" role="tablist">

                <li class="col-md-4 nav-item" role="presentation">
                    <button class="aboutMe nav-link active fw-bold w-100 py-2" id="aboutTab" data-bs-toggle="pill" data-bs-target="#aboutContent" type="button" role="tab">
                        About Me
                    </button>
                </li>

                <li class="col-md-4 nav-item" role="presentation">
                    <button class="whatCanIDo nav-link fw-bold w-100 py-2 btn-light" id="whatCanIDoTab" data-bs-toggle="pill" data-bs-target="#whatCanIdoContent" type="button" role="tab">
                        What can I do
                    </button>
                </li>

                <li class="col-md-4 nav-item" role="presentation">
                    <button class="underConstruction nav-link fw-bold w-100 py-2 btn-light" id="underConstructionTab" data-bs-toggle="pill" data-bs-target="#underConstructioncontent" type="button" role="tab">
                        Under Construction
                    </button>
                </li>

            </ul>

            <div class="tab-content text-light text-start" id="pills-tabContent">

                <div class="tab-pane fade show active" id="aboutContent" role="tabpanel">
                    <h3 class="border-bottom pb-2">Hi! My name is Caio</h3>
                    <p>I am a student in BSI, </p>
                </div>

                <div class="tab-pane fade" id="whatCanIdoContent" role="tabpanel">
                    <h3 class="border-bottom pb-2">My Toolkit</h3>
                    <ul>
                        <li>Python & Django</li>
                        <li>HTML, CSS, JavaScript</li>
                        <li>Ubuntu & Terminal Customization</li>
                    </ul>
                </div>

                <div class = "tab-pane fade d-flex justify-content-center" id="underConstructioncontent" role="tabpanel">
                    <img src="images/clubpenguin-penguin.gif" alt="Penguin drilling">
                </div>
            </div>

        </div>

    </div>

</body>
</html>
